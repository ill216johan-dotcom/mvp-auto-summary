# MVP Auto-Summary Infrastructure
# Usage: docker compose up -d
# Docs: docs/SPECS.md
#
# Stack: orchestrator (Python) + PostgreSQL + transcribe (STT adapter) + summaries-nginx
# STT: переключается через STT_PROVIDER=speechkit|whisper|assemblyai в .env
#
# MIGRATION NOTE (2026-03-04):
#   n8n replaced by native Python orchestrator.
#   See PLAN_REMOVE_N8N.md for details.

services:

  # ============================================================
  # orchestrator — Python scheduler + Telegram bot
  # Replaces n8n: WF01 (scan), WF02 (digest), WF03 (summary),
  #               WF04 (bot), WF06 (deadlines)
  # ============================================================
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # --- PostgreSQL ---
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # --- LLM (Claude via z.ai — Anthropic Messages API) ---
      - GLM4_API_KEY=${GLM4_API_KEY:?Set GLM4_API_KEY in .env}
      - GLM4_BASE_URL=${GLM4_BASE_URL:-https://api.z.ai/api/anthropic}
      - GLM4_MODEL=${GLM4_MODEL:-claude-3-5-haiku-20241022}
      # --- Telegram ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # --- Dify.ai (RAG + Knowledge Base) ---
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-https://dify-ff.duckdns.org}
      - DIFY_CHATBOT_URL=${DIFY_CHATBOT_URL:-}
      # --- Transcribe service ---
      - TRANSCRIBE_URL=http://transcribe:9001
      # --- Summaries ---
      - SUMMARIES_BASE_URL=${SUMMARIES_BASE_URL:-http://84.252.100.93:8181}
      # --- Bitrix24 CRM ---
      - BITRIX_WEBHOOK_URL=${BITRIX_WEBHOOK_URL:-}
      - BITRIX_CONTRACT_FIELD=${BITRIX_CONTRACT_FIELD:-UF_CRM_1632960743049}
      - BITRIX_SYNC_HOUR=${BITRIX_SYNC_HOUR:-22}
      - BITRIX_SYNC_ENABLED=${BITRIX_SYNC_ENABLED:-True}
      # --- Schedule ---
      - TIMEZONE=${TIMEZONE:-Europe/Moscow}
    volumes:
      - /mnt/recordings:/recordings:ro
      - summaries_data:/summaries
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mvp-network

  # ============================================================
  # n8n — DEPRECATED, kept for parallel migration
  # Remove after orchestrator is verified (see PLAN_REMOVE_N8N.md)
  # To disable: docker compose stop n8n
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    profiles:
      - legacy
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - /mnt/recordings:/recordings:ro
      - ./scripts:/scripts:ro
      - summaries_data:/summaries
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Moscow}
      - N8N_DEFAULT_LOCALE=ru
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - GLM4_API_KEY=${GLM4_API_KEY:-}
      - GLM4_BASE_URL=${GLM4_BASE_URL:-https://api.z.ai/api/anthropic}
      - GLM4_MODEL=${GLM4_MODEL:-claude-3-5-haiku-20241022}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-https://dify-ff.duckdns.org}
      - SUMMARIES_BASE_URL=${SUMMARIES_BASE_URL:-http://84.252.100.93:8181}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mvp-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mvp-network

  # ============================================================
  # transcribe — универсальный STT адаптер
  # Провайдер: STT_PROVIDER=speechkit|whisper|assemblyai
  # API: http://transcribe:9001
  # ============================================================
  transcribe:
    build:
      context: ./services/transcribe
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Активный провайдер STT (speechkit | whisper | assemblyai)
      - STT_PROVIDER=${STT_PROVIDER:-whisper}
      # SpeechKit (Yandex) — нужен при STT_PROVIDER=speechkit
      - YANDEX_API_KEY=${YANDEX_API_KEY:-}
      # Whisper self-hosted — нужен при STT_PROVIDER=whisper
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8000}
      - TRANSCRIBE_WORKERS=${TRANSCRIBE_WORKERS:-2}
      - TRANSCRIBE_QUEUE_SIZE=${TRANSCRIBE_QUEUE_SIZE:-50}
      - WHISPER_TIMEOUT_MIN=${WHISPER_TIMEOUT_MIN:-600}
      - WHISPER_TIMEOUT_MAX=${WHISPER_TIMEOUT_MAX:-86400}
      - WHISPER_TIMEOUT_MULTIPLIER=${WHISPER_TIMEOUT_MULTIPLIER:-4}
      # AssemblyAI — нужен при STT_PROVIDER=assemblyai
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY:-}
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - /mnt/recordings:/recordings:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mvp-network

  # ============================================================
  # whisper — faster-whisper HTTP сервер (self-hosted STT)
  # Включить: STT_PROVIDER=whisper + docker compose --profile whisper up -d
  # Модель: WHISPER_MODEL=medium (medium/large-v3)
  # GPU (если есть): раскомментировать deploy ниже
  # ============================================================
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    profiles:
      - whisper
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-medium}
      - WHISPER__LANGUAGE=ru
      - WHISPER__BEAM_SIZE=5
    volumes:
      - whisper_models:/root/.cache/huggingface
    # GPU-поддержка: раскомментировать если есть NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - mvp-network

  # ============================================================
  # summaries-nginx — Static file server for .md summaries
  # URL: http://84.252.100.93:8181/summaries/YYYY-MM-DD/LEAD-XXXX_*.md
  # ============================================================
  summaries-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8181:80"
    volumes:
      - summaries_data:/usr/share/nginx/html/summaries:ro
      - ./nginx/summaries.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mvp-network

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  summaries_data:
    driver: local
  whisper_models:
    driver: local

networks:
  mvp-network:
    driver: bridge
