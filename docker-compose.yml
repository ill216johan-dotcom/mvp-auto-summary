# MVP Auto-Summary Infrastructure
# Usage: docker compose up -d
# Docs: docs/SPECS.md
#
# NOTE: open-notebook + SurrealDB удалены 2026-02-26
# Причина: переход на Dify.ai для RAG (см. docs/ROADMAP_RAG_UI.md)
# Добавлен: summaries-nginx (порт 8181) — раздача .md саммари как статику

services:

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - /mnt/recordings:/recordings:ro
      - ./scripts:/scripts:ro
      - /usr/local/bin/ffmpeg:/usr/bin/ffmpeg:ro
      - summaries_data:/summaries
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Moscow}
      - N8N_DEFAULT_LOCALE=ru
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ALLOWED_PATHS=/recordings,/home/node/.n8n-files,/summaries
      - NODES_EXCLUDE=
      - EXECUTIONS_TIMEOUT=1800
      - EXECUTIONS_TIMEOUT_MAX=3600
      - GLM4_API_KEY=${GLM4_API_KEY}
      - GLM4_BASE_URL=${GLM4_BASE_URL:-https://api.z.ai/api/paas/v4}
      - GLM4_MODEL=${GLM4_MODEL:-glm-4.7-flashx}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_DATASET_ID=${DIFY_DATASET_ID:-ba120e09-0119-438f-b6d6-884e73b73334}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://dify:5001}
      - DIFY_CHATBOT_URL=${DIFY_CHATBOT_URL:-http://84.252.100.93:8080}
      - SUMMARIES_BASE_URL=${SUMMARIES_BASE_URL:-http://84.252.100.93:8181}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mvp-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mvp-network

  transcribe:
    build:
      context: ./services/transcribe
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - /mnt/recordings:/recordings:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mvp-network

  # Статический файловый сервер для саммари (.md файлы)
  # Саммари хранятся в /summaries/YYYY-MM-DD/LEAD-XXXX_*.md
  # Доступны по: http://84.252.100.93:8181/YYYY-MM-DD/LEAD-XXXX_call_YYYY-MM-DD.md
  summaries-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8181:80"
    volumes:
      - summaries_data:/usr/share/nginx/html/summaries:ro
      - ./nginx/summaries.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mvp-network

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  summaries_data:
    driver: local

networks:
  mvp-network:
    driver: bridge
