server {
    listen 80;
    server_name _;

    # Root — саммари в формате .md
    root /usr/share/nginx/html/summaries;

    # Заголовки для .md файлов (читаемо в браузере как текст)
    location /summaries/ {
        alias /usr/share/nginx/html/summaries/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        autoindex_format html;

        # .md файлы отдаём как plain text (читаются в браузере)
        location ~* \.md$ {
            default_type text/plain;
            charset utf-8;
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options nosniff;
        }
    }

    # Главная страница — редирект на /summaries/
    location = / {
        return 301 /summaries/;
    }

    # Health check
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Запрещаем доступ к скрытым файлам
    location ~ /\. {
        deny all;
    }

    # Логи
    access_log /var/log/nginx/summaries_access.log;
    error_log  /var/log/nginx/summaries_error.log;
}
